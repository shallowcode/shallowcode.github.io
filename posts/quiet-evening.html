        <p class="eyebrow">Essay</p>
        <h1>一个普通晚上，也值得留下来</h1>
        <p class="article-meta">2026.05.06 · 随笔</p>
      </header>
      <article class="article-body">
        <p>
          今天没有发生什么特别大的事。也正因为没有什么大事，才突然觉得这种普通晚上其实很适合写下来。
        </p>
        <p>
          有一段时间我总觉得博客应该写“有用”的东西，最好有结构、有结论、有可复用的方法。但后来发现，很多真正想留下来的东西，并不一定能马上变成结论。
        </p>
        <div class="article-callout">
          记录不一定要证明什么。它也可以只是提醒自己：这个阶段我确实这样生活过。
        </div>
        <h2>今天的小片段</h2>
        <ul>
          <li>晚饭后走了一小段路，天气不冷不热。</li>
          <li>听到一首很久没听的歌，突然想起以前的某个夏天。</li>
          <li>把博客重新打开，感觉像重新整理一张桌子。</li>
        </ul>
      </article>
    </main>
