        <p class="article-meta">2026.05.04 · 游戏 · 通关感想</p>
      </header>
      <article class="article-body">
        <p>
          很多游戏通关以后，我第一反应不是马上开二周目，而是想停一下。不是不好玩，恰恰是因为它留下的东西还没有完全散掉。
        </p>
        <figure class="article-photo">
          <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1100&q=80" alt="游戏手柄和屏幕">
          <figcaption>关掉游戏之后，脑子里还在回放几个场景。</figcaption>
        </figure>
        <h2>这次最吸引我的地方</h2>
        <p>
          比起单纯的战斗或数值成长，我更在意它的节奏控制。它知道什么时候让玩家紧张，也知道什么时候把空间交出来，让人自己在地图里闲逛。
        </p>
        <h2>想继续记录的点</h2>
        <ul>
          <li>剧情里哪些选择让我停顿了很久。</li>
          <li>哪些关卡的难度不是最高，但记忆点最强。</li>
          <li>截图里哪些画面适合单独整理成一篇照片记录。</li>
