        <p class="article-meta">2026.05.08 · 旅行 · 照片记录</p>
      </header>
      <article class="article-body">
        <p>
          出门前其实没有做太满的计划，只是想找个能看到水的地方走一走。到了之后才发现，风比想象中更大，很多照片也因此多了一点松散的动感。
        </p>
        <figure class="article-photo">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1100&q=80" alt="海边日落">
          <figcaption>傍晚的海边，光线刚好落到水面上。</figcaption>
        </figure>
        <h2>路线</h2>
        <p>
          下午到海边，先沿着栈道走了一段，再找了个能坐下来的地方等日落。路线很简单，但这种不用赶时间的行程反而更舒服。
        </p>
        <h2>记住的瞬间</h2>
        <ul>
          <li>风很大，拍照时手一直不稳。</li>
          <li>路边的小店意外好吃，尤其是热饮。</li>
          <li>回程路上天已经黑了，但心情比出门前轻很多。</li>
        </ul>
