<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{SUMMARY}}">
    <title>{{TITLE}} | 浅梦</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <main class="article-main">
      <a class="back-link" href="../index.html#posts">返回文章</a>
      <header class="article-header">
        <p class="eyebrow">{{CATEGORY_LABEL}}</p>
        <h1>{{TITLE}}</h1>
        <p class="article-meta">{{DATE}} · {{CATEGORY_CN}}</p>
      </header>
      <article class="article-body">
        <p>{{OPENING}}</p>

        <!-- Optional photo block:
        <figure class="article-photo">
          <img src="../assets/uploads/{{SLUG}}/cover.jpg" alt="{{PHOTO_ALT}}">
          <figcaption>{{PHOTO_CAPTION}}</figcaption>
        </figure>
        -->

        <h2>{{SECTION_TITLE}}</h2>
        <p>{{BODY}}</p>
      </article>
    </main>
    <script src="../script.js"></script>
  </body>
</html>
